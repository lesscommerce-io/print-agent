name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Type check
        run: bun run lint

      # Smoke build — ensures the cross-compile recipe stays green even when
      # we don't tag a release.
      - name: Build linux-x64 (smoke)
        run: bun run build:linux-x64
