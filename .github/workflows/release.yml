name: Release print-agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14         # Apple Silicon (M-chip)
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: app,dmg
          - platform: macos-13         # Intel Mac (legacy)
            target: x86_64-apple-darwin
            label: macos-x64
            bundles: app,dmg
          - platform: ubuntu-22.04     # Linux x64 (AppImage + .deb)
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            bundles: appimage,deb
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            bundles: msi,nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build with tauri-action
        # tauri-action wraps `tauri build` and uploads artifacts to releases.
        # We rely on the matrix `bundles` field to control output formats.
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          releaseName: "print-agent ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Desktop print agent for LessCommerce label printing.

            ## Downloads
            - **Windows**: `.msi` (recommended, registers deep-link + autostart) or portable `.exe`
            - **macOS**: `.dmg` — drag to Applications. First run: right-click → Open (unsigned).
            - **Linux**: `.AppImage` (single-file, no install) or `.deb` (installs system-wide)

            See [README](https://github.com/lesscommerce-io/print-agent#readme) for setup.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # tauri-action uploads the artifacts under their bundle-default names,
      # which include the app version (e.g. `LessCommerce.Print.Agent_0.3.1_x64-setup.exe`).
      # That breaks `releases/latest/download/<file>` links because the
      # filename changes every release. Re-upload the same bytes under a
      # stable, version-less name so the LessCommerce panel can hard-code
      # download URLs.
      - name: Re-upload assets under stable names
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p stable
          case "${{ matrix.label }}" in
            windows-x64)
              # NSIS produces <name>_<version>_x64-setup.exe — easier install,
              # silent install via /S. MSI also uploaded for IT-managed deployments.
              cp "$BUNDLE_DIR"/nsis/*-setup.exe stable/lesscommerce-print-agent-windows-x64-setup.exe
              cp "$BUNDLE_DIR"/msi/*_x64_*.msi  stable/lesscommerce-print-agent-windows-x64.msi
              ;;
            macos-arm64)
              cp "$BUNDLE_DIR"/dmg/*.dmg stable/lesscommerce-print-agent-macos-arm64.dmg
              ;;
            macos-x64)
              cp "$BUNDLE_DIR"/dmg/*.dmg stable/lesscommerce-print-agent-macos-x64.dmg
              ;;
            linux-x64)
              cp "$BUNDLE_DIR"/appimage/*.AppImage stable/lesscommerce-print-agent-linux-x64.AppImage
              cp "$BUNDLE_DIR"/deb/*.deb           stable/lesscommerce-print-agent-linux-x64.deb
              ;;
          esac
          ls -la stable/
          gh release upload "$TAG" stable/lesscommerce-print-agent-* --clobber -R "${{ github.repository }}"
