name: Release print-agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Type check
        run: bun run lint

      # Bun cross-compile produces a single self-contained binary per target.
      # No runtime, no node_modules to ship — just the binary.
      - name: Build all targets
        run: bun run build:all

      - name: Compute checksums
        working-directory: dist
        run: |
          shasum -a 256 lesscommerce-print-agent-* > SHA256SUMS
          cat SHA256SUMS

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: print-agent ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/lesscommerce-print-agent-linux-x64
            dist/lesscommerce-print-agent-linux-arm64
            dist/lesscommerce-print-agent-darwin-x64
            dist/lesscommerce-print-agent-darwin-arm64
            dist/lesscommerce-print-agent-windows-x64.exe
            dist/SHA256SUMS
