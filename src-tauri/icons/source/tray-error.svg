<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Macos-native style printer — thin uniform stroke (4px in 64-grid =
       ~1.4px @ 22px menu bar), rounded square corners. Strokes survive
       downsampling much better than filled shapes with internal detail. -->
  <g fill="none" stroke="#1f2937" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <!-- Body of the printer -->
    <rect x="10" y="22" width="44" height="22" rx="3"/>
    <!-- Top "feed" section, narrower so the silhouette has a step -->
    <rect x="18" y="10" width="28" height="12" rx="2"/>
    <!-- Output label coming out of the bottom -->
    <rect x="18" y="40" width="28" height="14" rx="2" fill="#ffffff"/>
    <!-- Two label lines (we keep them as fills, stroked text is unreadable here) -->
  </g>
  <g fill="#1f2937">
    <rect x="22" y="46" width="14" height="2.5" rx="1"/>
    <rect x="22" y="50.5" width="9" height="2"   rx="1"/>
  </g>

  <!-- Status pip — sits over the bottom-right corner so it doesn't fight
       the printer outline. White halo for legibility on both menu bar themes. -->
  <circle cx="52" cy="52" r="10" fill="#ef4444" stroke="#ffffff" stroke-width="2.5"/>
</svg>
